<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KREAM 리셀 차익 탐지기</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#222;min-height:100vh}
  .header{background:#fff;border-bottom:1px solid #eee;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  .header-title{font-size:17px;font-weight:600}
  .live-dot{display:inline-block;width:7px;height:7px;background:#22c55e;border-radius:50%;margin-right:6px;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .updated-text{font-size:12px;color:#888}
  .container{max-width:900px;margin:0 auto;padding:20px 16px}
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
  .metric{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #eee}
  .metric-label{font-size:12px;color:#888;margin-bottom:4px}
  .metric-value{font-size:20px;font-weight:600}
  .metric-value.green{color:#16a34a}
  .filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  select,input{height:36px;border:1px solid #ddd;border-radius:8px;padding:0 12px;font-size:13px;background:#fff;outline:none;color:#222}
  select:focus,input:focus{border-color:#888}
  .search-wrap{flex:1;min-width:200px}
  .search-wrap input{width:100%}
  .card{background:#fff;border-radius:12px;border:1px solid #eee;padding:16px 18px;margin-bottom:12px;transition:box-shadow .15s}
  .card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
  .card-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
  .card-img{width:56px;height:56px;border-radius:8px;background:#f0f0f0;object-fit:cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px}
  .card-img img{width:56px;height:56px;border-radius:8px;object-fit:cover}
  .card-title{font-size:14px;font-weight:600;margin-bottom:3px;line-height:1.4}
  .card-brand{font-size:12px;color:#888}
  .roi-badge{margin-left:auto;flex-shrink:0;font-size:12px;font-weight:600;padding:4px 10px;border-radius:99px}
  .roi-hot{background:#dcfce7;color:#15803d}
  .roi-ok{background:#dbeafe;color:#1d4ed8}
  .roi-low{background:#f1f5f9;color:#64748b}
  .roi-none{background:#f1f5f9;color:#94a3b8}
  .prices{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .price-box{background:#f9f9f9;border-radius:8px;padding:10px 12px}
  .price-box-label{font-size:11px;color:#888;margin-bottom:3px}
  .price-box-val{font-size:15px;font-weight:600}
  .price-box-val.blue{color:#2563eb}
  .price-box-val.green{color:#16a34a}
  .price-box-sub{font-size:11px;color:#aaa;margin-top:2px}
  .sizes{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
  .size-chip{font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid #e5e7eb;color:#6b7280;background:#fff}
  .size-chip.best{background:#f0fdf4;border-color:#86efac;color:#15803d;font-weight:600}
  .actions{display:flex;gap:8px}
  .btn-naver{flex:1;height:36px;border-radius:8px;border:1.5px solid #03C75A;background:#fff;color:#03C75A;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px}
  .btn-naver:hover{background:#f0fff8}
  .btn-kream{flex:1;height:36px;border-radius:8px;border:1.5px solid #333;background:#fff;color:#333;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px}
  .btn-kream:hover{background:#f8f8f8}
  .no-data{text-align:center;padding:60px 20px;color:#aaa;font-size:14px}
  .loading{text-align:center;padding:60px 20px;color:#888;font-size:14px}
  .spinner{width:32px;height:32px;border:3px solid #eee;border-top-color:#666;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr)}.prices{grid-template-columns:repeat(2,1fr)}.prices .price-box:last-child{grid-column:span 2}}
</style>
</head>
<body>

<div class="header">
  <div>
    <span class="live-dot"></span>
    <span class="header-title">KREAM 리셀 차익 탐지기</span>
  </div>
  <span class="updated-text" id="updated-text">로딩 중...</span>
</div>

<div class="container">
  <div class="metrics">
    <div class="metric"><div class="metric-label">추적 상품</div><div class="metric-value" id="m-total">-</div></div>
    <div class="metric"><div class="metric-label">ROI 10% 이상</div><div class="metric-value green" id="m-opps">-</div></div>
    <div class="metric"><div class="metric-label">최고 ROI</div><div class="metric-value green" id="m-roi">-</div></div>
    <div class="metric"><div class="metric-label">최대 순수익</div><div class="metric-value green" id="m-profit">-</div></div>
  </div>

  <div class="filters">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="상품명 검색..." oninput="render()">
    </div>
    <select id="filter-brand" onchange="render()">
      <option value="">전체 브랜드</option>
      <option>나이키</option>
      <option>조던</option>
      <option>아식스</option>
      <option>아디다스</option>
    </select>
    <select id="filter-roi" onchange="render()">
      <option value="0">ROI 전체</option>
      <option value="10">10% 이상</option>
      <option value="15">15% 이상</option>
      <option value="20">20% 이상</option>
    </select>
    <select id="filter-sort" onchange="render()">
      <option value="roi">ROI 높은 순</option>
      <option value="profit">순수익 높은 순</option>
      <option value="source">소싱가 낮은 순</option>
    </select>
  </div>

  <div id="card-list">
    <div class="loading"><div class="spinner"></div>데이터 불러오는 중...</div>
  </div>
</div>

<script>
let ALL_DATA = [];

function roiBadge(roi) {
  if (roi >= 15) return `<span class="roi-badge roi-hot">ROI ${roi}%</span>`;
  if (roi >= 10) return `<span class="roi-badge roi-ok">ROI ${roi}%</span>`;
  if (roi > 0)   return `<span class="roi-badge roi-low">ROI ${roi}%</span>`;
  return `<span class="roi-badge roi-none">시세 없음</span>`;
}

function fmt(n) { return n ? n.toLocaleString() : '-'; }

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const brand  = document.getElementById('filter-brand').value;
  const minRoi = parseFloat(document.getElementById('filter-roi').value) || 0;
  const sort   = document.getElementById('filter-sort').value;

  let list = ALL_DATA.filter(item => {
    if (search && !item.name.toLowerCase().includes(search)) return false;
    if (brand && item.brand !== brand) return false;
    if (minRoi && item.best_roi < minRoi) return false;
    return true;
  });

  if (sort === 'roi')    list.sort((a,b) => b.best_roi - a.best_roi);
  if (sort === 'profit') list.sort((a,b) => {
    const ap = a.sizes.find(s=>s.size===a.best_size)?.net || 0;
    const bp = b.sizes.find(s=>s.size===b.best_size)?.net || 0;
    return bp - ap;
  });
  if (sort === 'source') list.sort((a,b) => (a.source_price||999999) - (b.source_price||999999));

  const el = document.getElementById('card-list');
  if (!list.length) {
    el.innerHTML = '<div class="no-data">조건에 맞는 상품이 없어요</div>';
    return;
  }

  el.innerHTML = list.map(item => {
    const bestSizeData = item.sizes.find(s => s.size === item.best_size);
    const bestKreamPrice = bestSizeData?.kream_price || 0;
    const bestNet = bestSizeData?.net || 0;

    const sizeChips = item.sizes.map(s =>
      `<span class="size-chip ${s.size === item.best_size ? 'best' : ''}">${s.size}${s.size === item.best_size && s.roi > 0 ? ' ★' + s.roi + '%' : ''}</span>`
    ).join('');

    const imgHtml = item.naver?.image
      ? `<img src="${item.naver.image}" alt="" onerror="this.style.display='none'">`
      : '👟';

    const naverLink = item.naver?.link || `https://search.shopping.naver.com/search/all?query=${encodeURIComponent(item.name)}`;

    return `
    <div class="card">
      <div class="card-header">
        <div class="card-img">${imgHtml}</div>
        <div style="flex:1;min-width:0">
          <div class="card-title">${item.name}</div>
          <div class="card-brand">${item.brand}</div>
        </div>
        ${roiBadge(item.best_roi)}
      </div>
      <div class="prices">
        <div class="price-box">
          <div class="price-box-label">네이버 최저가</div>
          <div class="price-box-val blue">${fmt(item.source_price)}원</div>
          <div class="price-box-sub">${item.naver?.mall || '-'}</div>
        </div>
        <div class="price-box">
          <div class="price-box-label">KREAM 즉시판매가</div>
          <div class="price-box-val">${fmt(bestKreamPrice)}원</div>
          <div class="price-box-sub">${item.best_size || '-'} 기준</div>
        </div>
        <div class="price-box">
          <div class="price-box-label">예상 순수익</div>
          <div class="price-box-val green">${bestNet > 0 ? '+' + fmt(bestNet) + '원' : '-'}</div>
          <div class="price-box-sub">수수료·검수 후</div>
        </div>
      </div>
      <div class="sizes">${sizeChips}</div>
      <div class="actions">
        <a href="${naverLink}" target="_blank" class="btn-naver">네이버쇼핑 최저가 보기</a>
        <a href="${item.kream_url}" target="_blank" class="btn-kream">KREAM 시세 확인</a>
      </div>
    </div>`;
  }).join('');
}

function updateMetrics(data) {
  const items = data.items || [];
  const opps = items.filter(i => i.best_roi >= 10);
  const maxRoi = Math.max(...items.map(i => i.best_roi), 0);
  const maxProfit = Math.max(...items.flatMap(i => i.sizes.map(s => s.net || 0)), 0);

  document.getElementById('m-total').textContent = items.length + '개';
  document.getElementById('m-opps').textContent = opps.length + '개';
  document.getElementById('m-roi').textContent = maxRoi > 0 ? maxRoi + '%' : '-';
  document.getElementById('m-profit').textContent = maxProfit > 0 ? '+' + maxProfit.toLocaleString() + '원' : '-';
  document.getElementById('updated-text').textContent = '마지막 업데이트: ' + (data.updated || '-');
}

async function load() {
  try {
    const res = await fetch('./data/prices.json?t=' + Date.now());
    const data = await res.json();
    ALL_DATA = data.items || [];
    updateMetrics(data);
    render();
  } catch(e) {
    document.getElementById('card-list').innerHTML =
      '<div class="no-data">데이터를 불러오지 못했어요.<br>GitHub Actions가 아직 실행 전일 수 있어요.</div>';
  }
}

load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
